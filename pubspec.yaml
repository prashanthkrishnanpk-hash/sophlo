name: sophlo
description: Sophlo — Linguistic Survival Simulation. Survive anywhere.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Storage / persistence
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3

  # UI / fonts / animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  confetti: ^0.7.0

  # Audio
  just_audio: ^0.9.36
  audioplayers: ^5.2.1

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/lottie/
